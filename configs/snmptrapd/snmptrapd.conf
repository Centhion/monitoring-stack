# =============================================================================
# snmptrapd Configuration (Phase 9F)
# =============================================================================
# Receives SNMP traps on UDP 162 and forwards them as structured syslog
# messages to the Alloy gateway for ingestion into Loki.
#
# Architecture: SNMP Device -> snmptrapd (UDP 162) -> syslog (UDP 1514) -> Alloy -> Loki
#
# This runs as a sidecar container alongside the Alloy site gateway.
# In Docker Compose, it shares the monitoring network. In Kubernetes,
# it runs in the same pod as the gateway.
#
# Prerequisites:
#   - Net-SNMP snmptrapd package installed
#   - MIB files for OID resolution (optional but recommended)
#   - Network access from SNMP devices to this host on UDP 162
#
# Environment variables:
#   SNMP_COMMUNITY    -- SNMPv2c community string for trap authentication
#   SYSLOG_TARGET     -- Syslog destination (default: localhost:1514)
# =============================================================================

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Accept traps from any source using the configured community string.
# For production, restrict to known device IP ranges using
# authCommunity directives per subnet.
# ---------------------------------------------------------------------------
disableAuthorization yes
authCommunity log,execute,net public

# ---------------------------------------------------------------------------
# Trap Handler
# ---------------------------------------------------------------------------
# Format received traps as structured syslog messages and forward
# to the Alloy syslog receiver. The format includes:
#   - Source device IP
#   - Trap OID (enterprise.specific or generic trap type)
#   - Varbind values (key=value pairs)
#
# Format string reference (Net-SNMP traphandle format):
#   %a  -- source IP address
#   %A  -- transport address (IP:port)
#   %b  -- PDU source address
#   %B  -- community string
#   %N  -- enterprise OID (numeric)
#   %w  -- generic trap type (0-6)
#   %W  -- specific trap type
#   %q  -- specific trap type (numeric)
#   %v  -- varbinds (one per line)
# ---------------------------------------------------------------------------
traphandle default /usr/bin/snmptrapfmt

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Log all received traps to syslog facility local6.
# Alloy's syslog receiver listens for these messages.
#
# Format: structured syslog with OID resolution when MIBs are available.
# Without MIBs, OIDs appear as numeric dotted notation.
# ---------------------------------------------------------------------------
[snmp] logOption f /dev/stdout

# Forward formatted trap data to the Alloy syslog listener.
# Uses logger to write to local syslog facility, which Alloy tails.
format execute %B\n%a\n%N\n%w\n%W\n%v\n

# ---------------------------------------------------------------------------
# Output Format
# ---------------------------------------------------------------------------
# Use the built-in log handler to send traps as syslog messages.
# The Alloy syslog receiver (loki.source.syslog) parses these and
# extracts labels for Loki indexing.
# ---------------------------------------------------------------------------
outputOption s
