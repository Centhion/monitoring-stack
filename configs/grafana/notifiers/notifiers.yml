# =============================================================================
# Grafana Notification Provisioning
# =============================================================================
# Configures Grafana contact points and notification policies for
# Grafana-managed alerting. This supplements the Prometheus/Alertmanager
# pipeline with Grafana-native alerting capabilities.
#
# Mounted at: /etc/grafana/provisioning/notifiers/notifiers.yml
#
# Note: The primary alerting path is Prometheus rules -> Alertmanager -> Teams.
# Grafana contact points provide an additional notification path for
# Grafana-specific alert rules (e.g., dashboard-driven alerts).
#
# SITE ROUTING:
# This file mirrors the Alertmanager site-based routing structure.
# Per-site email contact points route critical/warning alerts to the
# appropriate site ops distribution list based on the `datacenter` label.
# Add or remove site entries to match your Alertmanager config.
# =============================================================================

apiVersion: 1

# ---------------------------------------------------------------------------
# Contact Points
# Define notification channels that Grafana alert rules can send to.
# ---------------------------------------------------------------------------
contactPoints:
  # -- Default Teams channel for all alert severities.
  - orgId: 1
    name: "Microsoft Teams"
    receivers:
      - uid: teams-webhook
        type: teams
        settings:
          url: "${TEAMS_WEBHOOK_URL}"
          title: >-
            [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
          sectiontitle: >-
            {{ .CommonLabels.hostname }} ({{ .CommonLabels.environment }})
          text: >-
            {{ .CommonAnnotations.summary }}
        disableResolveMessage: false

  # -- Default email fallback for unmapped datacenters.
  - orgId: 1
    name: "Email Fallback"
    receivers:
      - uid: email-fallback
        type: email
        settings:
          addresses: "${ALERT_EMAIL_TO:-ops-team@example.com}"
          singleEmail: true
        disableResolveMessage: false

  # -- Site-A email distribution list.
  - orgId: 1
    name: "Site-A Email"
    receivers:
      - uid: email-site-a
        type: email
        settings:
          addresses: "${SITE_A_EMAIL:-site-a-ops@example.com}"
          singleEmail: true
        disableResolveMessage: false

  # -- Site-B email distribution list.
  - orgId: 1
    name: "Site-B Email"
    receivers:
      - uid: email-site-b
        type: email
        settings:
          addresses: "${SITE_B_EMAIL:-site-b-ops@example.com}"
          singleEmail: true
        disableResolveMessage: false

  # -- Site-C email distribution list.
  - orgId: 1
    name: "Site-C Email"
    receivers:
      - uid: email-site-c
        type: email
        settings:
          addresses: "${SITE_C_EMAIL:-site-c-ops@example.com}"
          singleEmail: true
        disableResolveMessage: false

# ---------------------------------------------------------------------------
# Notification Policies
# Route alerts to contact points based on labels.
# Mirrors the Alertmanager routing hierarchy:
#   severity -> datacenter -> contact point
# ---------------------------------------------------------------------------
policies:
  - orgId: 1
    receiver: "Microsoft Teams"
    group_by:
      - alertname
      - hostname
      - datacenter
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts: route by datacenter to site-specific email + Teams.
      - receiver: "Email Fallback"
        matchers:
          - severity = critical
        continue: true
        group_wait: 15s
        repeat_interval: 1h
        routes:
          - receiver: "Site-A Email"
            matchers:
              - datacenter = site-a
            continue: true
          - receiver: "Site-B Email"
            matchers:
              - datacenter = site-b
            continue: true
          - receiver: "Site-C Email"
            matchers:
              - datacenter = site-c
            continue: true

      # Warning alerts: route by datacenter to site-specific email + Teams.
      - receiver: "Microsoft Teams"
        matchers:
          - severity = warning
        continue: false
        repeat_interval: 4h
        routes:
          - receiver: "Site-A Email"
            matchers:
              - datacenter = site-a
            continue: true
          - receiver: "Site-B Email"
            matchers:
              - datacenter = site-b
            continue: true
          - receiver: "Site-C Email"
            matchers:
              - datacenter = site-c
            continue: true

      # Info alerts: Teams only, no site routing.
      - receiver: "Microsoft Teams"
        matchers:
          - severity = info
        continue: false
        repeat_interval: 12h

# ---------------------------------------------------------------------------
# Mute Timings (Phase 9E)
# Define maintenance windows during which alerts are suppressed.
# Use these to silence expected noise during planned maintenance.
#
# To activate a mute timing:
#   1. Define the timing below
#   2. Reference it in a notification policy route using mute_time_intervals
#   3. Or use the Grafana UI: Alerting -> Notification policies -> Mute timings
#
# For API-driven maintenance windows, see scripts/maintenance_window.py
# which creates/removes mute timings programmatically.
# ---------------------------------------------------------------------------
muteTimes:
  # Example: Weekly Tuesday maintenance window (00:00 - 06:00 UTC).
  # Uncomment and adjust for your maintenance schedule.
  # - orgId: 1
  #   name: "Tuesday Maintenance"
  #   time_intervals:
  #     - times:
  #         - start_time: "00:00"
  #           end_time: "06:00"
  #       weekdays: ["tuesday"]

  # Example: Monthly patching window (first Saturday, all day).
  # - orgId: 1
  #   name: "Monthly Patching"
  #   time_intervals:
  #     - times:
  #         - start_time: "00:00"
  #           end_time: "23:59"
  #       weekdays: ["saturday"]
  #       days_of_month: ["1:7"]

  # Example: Site-specific maintenance (combine with datacenter matcher).
  # Reference this mute timing in a route with datacenter = site-a to
  # only suppress alerts for a specific site during its maintenance window.
  # - orgId: 1
  #   name: "Site-A Maintenance"
  #   time_intervals:
  #     - times:
  #         - start_time: "02:00"
  #           end_time: "06:00"
  #       weekdays: ["wednesday"]
