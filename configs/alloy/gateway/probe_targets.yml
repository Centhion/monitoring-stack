# =============================================================================
# Probe Target Inventory (Phase 9A)
# =============================================================================
# Master list of infrastructure endpoints to probe for reachability and
# synthetic monitoring. Each entry becomes a blackbox probe target in the
# site gateway Alloy config.
#
# This file is per-site -- each site gateway deployment gets its own copy
# with targets reachable from that site's network.
#
# Adding a new target:
#   1. Add an entry below with all required fields
#   2. Restart the gateway Alloy container (or wait for config reload)
#   3. The target appears in the Probing Overview dashboard automatically
#
# Fields:
#   name        -- unique identifier (used as job label and dashboard display)
#   address     -- target address (format depends on module):
#                    ICMP:  hostname or IP (no port)
#                    TCP:   hostname:port
#                    UDP:   hostname:port
#                    HTTP:  full URL (http:// or https://)
#   module      -- blackbox module from blackbox_modules.yml:
#                    icmp_check          -- ICMP ping
#                    tcp_check           -- TCP port open
#                    udp_dns_check       -- DNS resolver check
#                    http_synthetic      -- HTTP GET with validation
#                    http_post_synthetic -- HTTP POST with payload
#   labels      -- custom labels for dashboard filtering
#     datacenter  -- site/datacenter this target belongs to
#     environment -- prod, staging, dev
#     probe_type  -- icmp, tcp, udp, http (for dashboard categorization)
#     service     -- human-readable service name
#     owner       -- team responsible for this service
#
# IMPORTANT: This file is a TEMPLATE. Replace placeholder entries with
# actual targets for your environment.
# =============================================================================

