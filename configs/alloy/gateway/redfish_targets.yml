# =============================================================================
# Redfish Hardware Target Inventory (Phase 7B)
# =============================================================================
# Lists BMC management interfaces (iLO / iDRAC) to monitor via the Redfish
# API exporter sidecar. Each entry maps to a physical server's out-of-band
# management controller.
#
# This file is a reference template. The actual targets are defined in the
# prometheus.scrape "redfish" block in site_gateway.alloy using the
# multi-target pattern (one exporter instance, multiple BMC targets via
# __param_target).
#
# When deploying a new site, copy this template and fill in the BMC IPs,
# hostnames, and labels for each physical server at that site.
#
# Required: The Redfish exporter sidecar must be running on the same host
# as the Alloy site gateway container. It listens on localhost:9220 by
# default and accepts the target BMC address as a URL parameter.
#
# Label taxonomy:
#   datacenter   -- site identifier (populated from ALLOY_DATACENTER env var)
#   environment  -- prod, staging, dev (populated from ALLOY_ENV env var)
#   device_type  -- always "server_bmc" for Redfish targets
#   vendor       -- "hpe" (iLO) or "dell" (iDRAC)
#   device_name  -- human-readable server name for dashboard display
#   bmc_type     -- "ilo" or "idrac" for vendor-specific dashboard filtering
# =============================================================================

# -------------------------------------------------------------------------
# Example Target Entries
# -------------------------------------------------------------------------
# Uncomment and customize for each site's physical servers.
# Each target in site_gateway.alloy follows this structure:
#
#   {
#     "__address__"     = "localhost:9220",       # Redfish exporter sidecar
#     "__param_target"  = "10.0.1.50",            # BMC management IP
#     "instance"        = "10.0.1.50",            # Instance label for Prometheus
#     "device_name"     = "ESXi Host 01 iLO",     # Human-readable name
#     "vendor"          = "hpe",                   # hpe or dell
#     "device_type"     = "server_bmc",            # Fixed device type
#     "bmc_type"        = "ilo",                   # ilo or idrac
#   }
# -------------------------------------------------------------------------

