# =============================================================================
# SNMP Target Inventory (Phase 7A)
# =============================================================================
# Master list of network devices to poll via SNMP. Each entry becomes a
# target in the gateway Alloy config. This file is per-site -- each site
# gateway deployment gets its own copy with local device addresses.
#
# Adding a new device:
#   1. Add an entry below with all required fields
#   2. Restart the gateway Alloy container (or wait for config reload)
#   3. The device appears in the Network Infrastructure dashboard
#
# Fields:
#   name        -- unique identifier (used as job label suffix)
#   address     -- device management IP or hostname
#   module      -- comma-separated SNMP modules to poll:
#                    system     -- sysUpTime, sysName, sysDescr, sysLocation
#                    if_mib     -- interface traffic, errors, status (works on all devices)
#                    paloalto   -- PAN-MIB enterprise metrics (firewalls only)
#                    ubiquiti_unifi -- UniFi-specific metrics (UniFi gear only)
#   auth        -- named auth profile from snmp_auths.yml
#   labels      -- custom labels for dashboard filtering
#     datacenter  -- site/resort this device belongs to
#     environment -- prod, staging, dev
#     device_type -- switch, firewall, access_point, ups, nas
#     vendor      -- cisco, paloalto, ubiquiti, apc, synology
#     device_name -- human-readable device name for dashboard display
#
# IMPORTANT: This file is a TEMPLATE. Replace placeholder entries with
# actual device addresses for your environment.
# =============================================================================

# -----------------------------------------------------------------------------
# PLACEHOLDER TARGETS -- replace with your actual devices
# -----------------------------------------------------------------------------

