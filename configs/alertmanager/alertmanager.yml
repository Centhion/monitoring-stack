# =============================================================================
# Alertmanager Configuration
# =============================================================================
# Routes, groups, and dispatches alerts from Prometheus to notification
# channels. Primary channel is Microsoft Teams via incoming webhook.
# Email distribution lists provide site-specific alerting per datacenter.
#
# IMPORTANT: Alertmanager does NOT support shell-style environment variable
# substitution (${VAR:-default}). All values in this file are literal.
# For Kubernetes, use Helm templating or Kustomize to inject real values.
# For local Docker Compose testing, either:
#   1. Edit this file directly (changes are gitignored via .env)
#   2. Accept the placeholder values (SMTP/webhook will fail gracefully)
#
# Values to replace for production:
#   TEAMS_WEBHOOK_URL       -- Microsoft Teams incoming webhook URL
#   smtp_smarthost           -- Your SMTP relay host:port
#   smtp_from                -- Sender email address
#   smtp_auth_username       -- SMTP authentication username
#   smtp_auth_password       -- SMTP authentication password
#   site-a, site-b, site-c   -- Your datacenter/site names
#   *-ops@example.com        -- Your per-site email distribution lists
#
# SITE ROUTING PATTERN:
#   To add a new site, copy an existing site block in routes and receivers,
#   then replace the datacenter name and email address. No structural changes
#   are needed -- the routing tree is designed for horizontal site expansion.
# =============================================================================

global:
  # Timeout for resolving alerts. If an alert is not resolved within this
  # window after it stops firing, Alertmanager marks it resolved.
  resolve_timeout: 5m

  # SMTP defaults for email notifications.
  # Replace with your SMTP relay for production. These placeholders allow
  # Alertmanager to start without errors; email delivery will fail until
  # real values are provided.
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "monitoring@example.com"
  smtp_require_tls: true
  smtp_auth_username: "monitoring@example.com"
  smtp_auth_password: "changeme"

# ---------------------------------------------------------------------------
# Templates
# Custom notification templates for Teams webhook messages.
# ---------------------------------------------------------------------------
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ---------------------------------------------------------------------------
# Route Tree
# Determines which receiver handles each alert based on labels.
# The tree is evaluated top-down; first match wins.
#
# Routing hierarchy:
#   severity (critical/warning/info)
#     -> datacenter (site-a, site-b, site-c, ...)
#       -> receiver (Teams webhook + site-specific email DL)
#
# Grouping: Alerts are grouped by alertname + hostname + datacenter to
# reduce notification spam while keeping site-level isolation.
# ---------------------------------------------------------------------------
route:
  # Default receiver catches any alert that does not match a child route.
  # This fallback ensures no alerts are dropped during incremental site
  # onboarding -- unmapped datacenters still reach the ops team.
  receiver: teams_default

  # Group alerts by these labels. All alerts with the same combination
  # of alertname, hostname, and datacenter are bundled into one notification.
  # Datacenter grouping prevents cross-site alert mixing.
  group_by:
    - alertname
    - hostname
    - datacenter

  # Wait this long before sending the first notification for a new group.
  # Allows time for related alerts to fire and be grouped together.
  group_wait: 30s

  # After the first notification, wait this long before sending updates
  # about new alerts joining the group.
  group_interval: 5m

  # How often to re-send notifications for an alert that is still firing.
  repeat_interval: 4h

  # Severity-based child routes. Each severity tier contains datacenter
  # child routes that map to site-specific receivers.
  routes:
    # -------------------------------------------------------------------
    # CRITICAL: Immediate notification to Teams AND site-specific email.
    # Shorter group_wait (15s) and repeat_interval (1h) for urgency.
    # -------------------------------------------------------------------
    - match:
        severity: critical
      group_wait: 15s
      repeat_interval: 1h

      routes:
        # Site-A critical alerts -> Teams + Site-A ops email DL
        - match:
            datacenter: site-a
          receiver: site_a_critical
          continue: false

        # Site-B critical alerts -> Teams + Site-B ops email DL
        - match:
            datacenter: site-b
          receiver: site_b_critical
          continue: false

        # Site-C critical alerts -> Teams + Site-C ops email DL
        - match:
            datacenter: site-c
          receiver: site_c_critical
          continue: false

        # Fallback: unmapped datacenters get Teams + default ops email.
        # This catches new sites before their routes are configured.
        - receiver: teams_and_email

      continue: false

    # -------------------------------------------------------------------
    # WARNING: Teams notification AND site-specific email.
    # Standard timing -- not as urgent as critical.
    # -------------------------------------------------------------------
    - match:
        severity: warning
      repeat_interval: 4h

      routes:
        # Site-A warning alerts -> Teams + Site-A ops email DL
        - match:
            datacenter: site-a
          receiver: site_a_warning
          continue: false

        # Site-B warning alerts -> Teams + Site-B ops email DL
        - match:
            datacenter: site-b
          receiver: site_b_warning
          continue: false

        # Site-C warning alerts -> Teams + Site-C ops email DL
        - match:
            datacenter: site-c
          receiver: site_c_warning
          continue: false

        # Fallback: unmapped datacenters get Teams only.
        - receiver: teams_default

      continue: false

    # -------------------------------------------------------------------
    # INFO: Teams only, reduced frequency, no site routing.
    # Informational alerts do not need email distribution.
    # -------------------------------------------------------------------
    - match:
        severity: info
      receiver: teams_info
      repeat_interval: 12h
      continue: false

# ---------------------------------------------------------------------------
# Inhibition Rules
# Suppress noisy alerts when a higher-severity condition explains them.
# ---------------------------------------------------------------------------
inhibit_rules:
  # If a server is completely down, suppress all other alerts for that server.
  # No point alerting on high CPU if the server is unreachable.
  - source_matchers:
      - alertname =~ "WindowsServerDown|LinuxServerDown"
    target_matchers:
      - severity =~ "warning|info"
    equal:
      - hostname

  # If Prometheus cannot reach Alertmanager, suppress fleet-level alerts
  # since the monitoring pipeline itself is broken.
  - source_matchers:
      - alertname = "PrometheusNotificationsFailing"
    target_matchers:
      - alertname =~ "Fleet.*"

  # -----------------------------------------------------------------------
  # Mass-Outage Inhibition (Phase 9D)
  # When a site-level outage is detected, suppress individual host-down
  # and service-level alerts for that site. The SitePartialOutage or
  # SiteMajorOutage alert is the actionable signal; per-host alerts are
  # noise during a mass event.
  # -----------------------------------------------------------------------

  # Major outage suppresses all per-host critical and warning alerts at the site.
  - source_matchers:
      - alertname = "SiteMajorOutage"
    target_matchers:
      - severity =~ "critical|warning"
      - outage_scope != "site"
    equal:
      - datacenter

  # Partial outage suppresses per-host warning alerts at the site.
  # Critical per-host alerts still fire alongside the partial outage
  # alert, since a partial outage may not explain every individual failure.
  - source_matchers:
      - alertname = "SitePartialOutage"
    target_matchers:
      - severity = "warning"
      - outage_scope != "site"
    equal:
      - datacenter

  # Role-level outage suppresses per-host warnings for that role at that site.
  - source_matchers:
      - alertname = "RolePartialOutage"
    target_matchers:
      - severity = "warning"
      - outage_scope != "role"
    equal:
      - datacenter
      - role

# ---------------------------------------------------------------------------
# Receivers
# Define how notifications are delivered for each channel.
#
# ADDING A NEW SITE:
#   1. Copy an existing site block (e.g., site_a_critical + site_a_warning)
#   2. Replace "site_a" with your site name in the receiver name
#   3. Replace "site-a-ops@example.com" with your site's email DL
#   4. Add matching route entries in the route tree above
# ---------------------------------------------------------------------------
receivers:
  # ==========================================================================
  # Default / Fallback Receivers
  # These handle alerts from unmapped datacenters or non-site-specific alerts.
  # ==========================================================================

  # Teams channel for default and warning-level fallback alerts.
  # Replace the webhook URL with your Teams incoming webhook for production.
  - name: teams_default
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true

  # Fallback for critical alerts from unmapped datacenters.
  # Both Teams and a catch-all email ensure nothing is missed.
  - name: teams_and_email
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "ops-team@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"

  # Info-level alerts go to Teams with no resolved notification.
  - name: teams_info
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: false

  # ==========================================================================
  # Site-A Receivers
  # Replace "site-a-ops@example.com" with Site-A's ops distribution list.
  # ==========================================================================
  - name: site_a_critical
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "site-a-ops@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] [site-a] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"

  - name: site_a_warning
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "site-a-ops@example.com"
        send_resolved: true
        headers:
          Subject: "[WARNING] [site-a] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"

  # ==========================================================================
  # Site-B Receivers
  # Replace "site-b-ops@example.com" with Site-B's ops distribution list.
  # ==========================================================================
  - name: site_b_critical
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "site-b-ops@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] [site-b] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"

  - name: site_b_warning
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "site-b-ops@example.com"
        send_resolved: true
        headers:
          Subject: "[WARNING] [site-b] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"

  # ==========================================================================
  # Site-C Receivers
  # Replace "site-c-ops@example.com" with Site-C's ops distribution list.
  # ==========================================================================
  - name: site_c_critical
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "site-c-ops@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] [site-c] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"

  - name: site_c_warning
    webhook_configs:
      - url: "https://example.com/webhook/placeholder"
        send_resolved: true
    email_configs:
      - to: "site-c-ops@example.com"
        send_resolved: true
        headers:
          Subject: "[WARNING] [site-c] {{ .GroupLabels.alertname }} on {{ .GroupLabels.hostname }}"
