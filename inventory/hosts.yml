# Host Inventory -- Server and Device Registry
# Lists all servers that will run the Alloy monitoring agent.
# Used by Ansible playbooks for deployment and by validation scripts for compliance.
#
# Usage:
#   python3 scripts/fleet_inventory.py validate    # Check for errors
#   python3 scripts/fleet_inventory.py report      # Summary by site/role/OS
#   ansible-playbook -i inventory/hosts.yml ansible/deploy_alloy.yml
#
# Bulk import: Convert a CSV/CMDB export to this format:
#   python3 scripts/fleet_inventory.py import --csv hosts.csv

hosts:
  # -- Example host entries (uncomment and customize)
  # srv-web-01:
  #   site: site-alpha          # Must match a key in sites.yml
  #   roles:                    # One or more roles from valid_roles in sites.yml
  #     - iis
  #   os: windows               # windows or linux
  #   ip: 10.0.1.10             # Management IP (for Ansible connectivity)
  #   notes: "Production web server, IIS 10"
  #
  # srv-sql-01:
  #   site: site-alpha
  #   roles:
  #     - sql
  #   os: windows
  #   ip: 10.0.1.20
  #   notes: "SQL Server 2019, AlwaysOn AG primary"
  #
  # srv-docker-01:
  #   site: site-alpha
  #   roles:
  #     - docker
  #   os: linux
  #   ip: 10.0.2.10
  #   notes: "Docker host, Ubuntu 22.04"
  #
  # srv-dc-01:
  #   site: site-beta
  #   roles:
  #     - dc
  #   os: windows
  #   ip: 10.1.0.10
  #   notes: "Primary domain controller"
