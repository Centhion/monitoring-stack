# =============================================================================
# Docker Compose -- Enterprise Monitoring Stack (PoC / Local Testing)
# =============================================================================
# Spins up the full observability backend for local validation before
# deploying to Kubernetes. Services are memory-limited to run alongside
# developer workloads on Docker Desktop (~2 GB total).
#
# Usage:
#   docker compose -f deploy/docker/docker-compose.yml up -d   Start all services
#   docker compose -f deploy/docker/docker-compose.yml ps      Check health status
#   docker compose -f deploy/docker/docker-compose.yml logs -f  Stream all logs
#   docker compose -f deploy/docker/docker-compose.yml down -v  Stop and remove volumes
#
# After startup:
#   Grafana:      http://localhost:3000  (admin / admin)
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093
#   Loki:         http://localhost:3100  (API only)
#
# Alloy is NOT included here -- it runs on monitored servers (or your
# Windows host for testing). See configs/alloy/local/ for a local config.
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # Prometheus -- Metrics Storage and Rule Evaluation
  # -------------------------------------------------------------------------
  # Receives metrics from Alloy via remote_write and evaluates alerting
  # and recording rules. Scrapes itself and the other stack components.
  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: mon-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Main config
      - ../../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Recording rules and alert rules under /etc/prometheus/rules/
      - ../../configs/prometheus/recording_rules.yml:/etc/prometheus/rules/recording_rules.yml:ro
      - ../../alerts/prometheus/windows_alerts.yml:/etc/prometheus/rules/windows_alerts.yml:ro
      - ../../alerts/prometheus/linux_alerts.yml:/etc/prometheus/rules/linux_alerts.yml:ro
      - ../../alerts/prometheus/infra_alerts.yml:/etc/prometheus/rules/infra_alerts.yml:ro
      - ../../alerts/prometheus/role_alerts.yml:/etc/prometheus/rules/role_alerts.yml:ro
      # Phase 9 rule files
      - ../../alerts/prometheus/probe_alerts.yml:/etc/prometheus/rules/probe_alerts.yml:ro
      - ../../alerts/prometheus/endpoint_alerts.yml:/etc/prometheus/rules/endpoint_alerts.yml:ro
      - ../../alerts/prometheus/outage_alerts.yml:/etc/prometheus/rules/outage_alerts.yml:ro
      - ../../configs/prometheus/probe_recording_rules.yml:/etc/prometheus/rules/probe_recording_rules.yml:ro
      - ../../configs/prometheus/outage_recording_rules.yml:/etc/prometheus/rules/outage_recording_rules.yml:ro
      - ../../configs/prometheus/sla_recording_rules.yml:/etc/prometheus/rules/sla_recording_rules.yml:ro
      - ../../configs/prometheus/iis_recording_rules.yml:/etc/prometheus/rules/iis_recording_rules.yml:ro
      # Phase 7 rule files -- SNMP, hardware, and certificate monitoring
      - ../../configs/prometheus/snmp_recording_rules.yml:/etc/prometheus/rules/snmp_recording_rules.yml:ro
      - ../../configs/prometheus/hardware_recording_rules.yml:/etc/prometheus/rules/hardware_recording_rules.yml:ro
      - ../../configs/prometheus/cert_recording_rules.yml:/etc/prometheus/rules/cert_recording_rules.yml:ro
      - ../../alerts/prometheus/snmp_alerts.yml:/etc/prometheus/rules/snmp_alerts.yml:ro
      - ../../alerts/prometheus/hardware_alerts.yml:/etc/prometheus/rules/hardware_alerts.yml:ro
      - ../../alerts/prometheus/cert_alerts.yml:/etc/prometheus/rules/cert_alerts.yml:ro
      # Persistent TSDB storage -- mounted at /prometheus (image default, writable by nobody)
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=5GB"
      - "--storage.tsdb.wal-compression"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - monitoring

  # -------------------------------------------------------------------------
  # Loki -- Log Aggregation
  # -------------------------------------------------------------------------
  # Receives log entries from Alloy via push API. Stores logs on local
  # filesystem with TSDB indexing. Retention set to 7 days for PoC.
  loki:
    image: grafana/loki:3.4.2
    container_name: mon-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ../../configs/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/loki.yml"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - monitoring

  # -------------------------------------------------------------------------
  # Alertmanager -- Alert Routing and Notification
  # -------------------------------------------------------------------------
  # Receives alerts from Prometheus, deduplicates, groups, and routes
  # them to Teams webhook and email channels.
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: mon-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../../configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../../configs/alertmanager/templates/teams.tmpl:/etc/alertmanager/templates/teams.tmpl:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    environment:
      # Teams webhook -- set a real URL in .env for notification testing.
      # Without it, Alertmanager logs delivery failures (non-fatal).
      TEAMS_WEBHOOK_URL: "${TEAMS_WEBHOOK_URL:-https://example.com/webhook/placeholder}"
      SMTP_HOST: "${SMTP_HOST:-smtp.example.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_FROM: "${SMTP_FROM:-monitoring@example.com}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-ops-team@example.com}"
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - monitoring

  # -------------------------------------------------------------------------
  # Grafana -- Dashboards, Exploration, and Alerting UI
  # -------------------------------------------------------------------------
  # Provisioned with datasources, dashboards, and notification policies
  # from config files. No manual setup required after startup.
  grafana:
    image: grafana/grafana:11.5.2
    container_name: mon-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Datasource provisioning (Prometheus + Loki)
      - ../../configs/grafana/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      # Dashboard provisioning config (points to dashboard directories)
      - ../../configs/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      # Notification/contact point provisioning
      - ../../configs/grafana/notifiers/notifiers.yml:/etc/grafana/provisioning/notifiers/notifiers.yml:ro
      # Dashboard JSON files mounted to the paths expected by the provisioning config
      - ../../dashboards/windows:/var/lib/grafana/dashboards/windows:ro
      - ../../dashboards/linux:/var/lib/grafana/dashboards/linux:ro
      - ../../dashboards/overview:/var/lib/grafana/dashboards/overview:ro
      # Phase 7 dashboard directories
      - ../../dashboards/network:/var/lib/grafana/dashboards/network:ro
      - ../../dashboards/hardware:/var/lib/grafana/dashboards/hardware:ro
      - ../../dashboards/certs:/var/lib/grafana/dashboards/certs:ro
      # Persistent Grafana database (users, preferences, annotations)
      - grafana_data:/var/lib/grafana
    environment:
      # Default admin credentials for local testing
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Disable login form requirement for faster local iteration
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Allow embedding for development
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Disable update checks and analytics
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Structured JSON logging for audit trail (Phase 9G)
      GF_LOG_MODE: "console file"
      GF_LOG_LEVEL: "info"
      GF_LOG_CONSOLE_FORMAT: "json"
      # Environment variable expansion in provisioning files
      PROMETHEUS_URL: "http://prometheus:9090"
      LOKI_URL: "http://loki:3100"
      TEAMS_WEBHOOK_URL: "${TEAMS_WEBHOOK_URL:-https://example.com/webhook/placeholder}"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - monitoring

  # -------------------------------------------------------------------------
  # Blackbox Exporter -- Synthetic Probing and Certificate Monitoring
  # -------------------------------------------------------------------------
  # Performs ICMP, TCP, HTTP, and TLS probes against configured targets.
  # Used by the site gateway Alloy config for certificate monitoring and
  # synthetic reachability checks. Runs embedded in Alloy in production;
  # standalone here for local testing without a full Alloy gateway.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: mon-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ../../configs/alloy/certs/blackbox_modules.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9115/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - monitoring

  # -------------------------------------------------------------------------
  # SNMP Trap Receiver -- SNMP Trap Ingestion
  # -------------------------------------------------------------------------
  # Receives SNMP traps (UDP 162) and forwards them as syslog messages
  # to the Alloy gateway for Loki ingestion. In production, this runs as
  # a sidecar alongside the site gateway container.
  #
  # Disabled by default in local testing (most developers don't have SNMP
  # devices). Uncomment the profiles line to include in `docker compose up`.
  snmptrapd:
    image: polinux/snmptrapd:latest
    container_name: mon-snmptrapd
    restart: unless-stopped
    profiles:
      - snmp    # Only starts with: docker compose --profile snmp up
    ports:
      - "162:162/udp"
    volumes:
      - ../../configs/snmptrapd/snmptrapd.conf:/etc/snmp/snmptrapd.conf:ro
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - monitoring

  # -------------------------------------------------------------------------
  # Redfish Exporter -- Hardware Health via BMC API
  # -------------------------------------------------------------------------
  # Proxies Redfish API requests to server BMCs (iLO, iDRAC). Uses the
  # multi-target pattern: Prometheus/Alloy sends ?target=<BMC_IP> and
  # this exporter queries the BMC's Redfish API.
  #
  # Disabled by default in local testing (requires BMC network access).
  # Uncomment the profiles line to include in `docker compose --profile hardware up`.
  redfish-exporter:
    image: jenningsloy318/redfish_exporter:latest
    container_name: mon-redfish
    restart: unless-stopped
    profiles:
      - hardware    # Only starts with: docker compose --profile hardware up
    ports:
      - "9220:9220"
    environment:
      # BMC credentials -- override in .env for testing against real hardware
      REDFISH_USER: "${REDFISH_USER:-admin}"
      REDFISH_PASSWORD: "${REDFISH_PASSWORD:-changeme}"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - monitoring

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge
    name: monitoring-network

# ---------------------------------------------------------------------------
# Named Volumes
# Persistent storage survives container restarts. Use `docker compose down -v`
# to delete volumes and start fresh.
# ---------------------------------------------------------------------------
volumes:
  prometheus_data:
    name: mon-prometheus-data
  loki_data:
    name: mon-loki-data
  grafana_data:
    name: mon-grafana-data
