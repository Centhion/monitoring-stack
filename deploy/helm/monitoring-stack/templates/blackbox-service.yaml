{{- if .Values.blackboxExporter.enabled }}
# ---------------------------------------------------------------------------
# Blackbox Exporter Service (ClusterIP)
# ---------------------------------------------------------------------------
# Exposes the blackbox exporter HTTP API within the cluster.
# Prometheus/Alloy sends probe requests to this service endpoint.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "blackbox-exporter") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "blackbox-exporter") | nindent 4 }}
spec:
  type: {{ .Values.blackboxExporter.service.type }}
  ports:
    - port: {{ .Values.blackboxExporter.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "blackbox-exporter") | nindent 4 }}
{{- end }}
