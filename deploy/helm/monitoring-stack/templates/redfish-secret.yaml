{{- if and .Values.redfishExporter.enabled (not .Values.redfishExporter.credentials.existingSecret) }}
# ---------------------------------------------------------------------------
# Redfish Exporter Secret
# ---------------------------------------------------------------------------
# BMC credentials for Redfish API access. For production deployments,
# use redfishExporter.credentials.existingSecret to reference a
# pre-existing Secret managed outside of Helm.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "redfish-exporter") }}-secret
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "redfish-exporter") | nindent 4 }}
type: Opaque
data:
  redfish-user: {{ .Values.redfishExporter.credentials.user | b64enc | quote }}
  redfish-password: {{ .Values.redfishExporter.credentials.password | b64enc | quote }}
{{- end }}
