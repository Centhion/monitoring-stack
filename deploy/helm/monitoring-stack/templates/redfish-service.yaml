{{- if .Values.redfishExporter.enabled }}
# ---------------------------------------------------------------------------
# Redfish Exporter Service (ClusterIP)
# ---------------------------------------------------------------------------
# Exposes the Redfish exporter HTTP API within the cluster.
# Prometheus/Alloy sends multi-target scrape requests to this endpoint.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-stack.componentFullname" (dict "context" . "component" "redfish-exporter") }}
  namespace: {{ include "monitoring-stack.namespace" . }}
  labels:
    {{- include "monitoring-stack.componentLabels" (dict "context" . "component" "redfish-exporter") | nindent 4 }}
spec:
  type: {{ .Values.redfishExporter.service.type }}
  ports:
    - port: {{ .Values.redfishExporter.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monitoring-stack.selectorLabels" (dict "context" . "component" "redfish-exporter") | nindent 4 }}
{{- end }}
